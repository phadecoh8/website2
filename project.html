<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Profile</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        /* Small fade/slide animation for project items when filters change */
        .project-item {
            transition: opacity .22s ease, transform .22s ease;
            will-change: opacity, transform;
        }

        /* 'is-hidden' represents the visually hidden state used by the script */
        .project-item.is-hidden {
            opacity: 0;
            transform: translateY(6px);
            pointer-events: none;
            /* avoid accidental clicks while hiding */
        }
    </style>
</head>

<body>
    <!-- NavBar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a href="index.html" class="navbar-brand">My Portfolio</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a href="index.html" class="nav-link">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="about.html" class="nav-link">About</a>
                    </li>
                    <li class="nav-item">
                        <a href="project.html" class="nav-link active">Projects</a>
                    </li>
                    <li class="nav-item">
                        <a href="contact.html" class="nav-link">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- About Section -->
    <section class="container py-5">
        <h1 class="">
            My Projects
        </h1>
        <div id="filter-buttons" class="mb-3"></div>
        <div class="row" id="items-container">
            <!-- Project items will be injected here by js/projects.js -->
        </div>
        <div class="d-flex justify-content-between mt-4">
            <button id="pre-page" class="btn btn-outline-secondary">← About</button>
            <button id="next-page" class="btn btn-outline-secondary">Contact →</button>
        </div>
    </section>
    <footer>
        <div class="text-center p-3 bg-dark text-white" class="mt-5" style="position: fixed; bottom: 0; width: 100%;">
            &copy; 2024 Fadero Joshua.
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="js/projects.js"></script>
